<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Autoliv — The E7 Platform Opportunity</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',system-ui,sans-serif;background:#f8fafb;color:#1a1a2e;line-height:1.7}

/* ─── AUTOLIV BRAND ─── */
:root{
  --alv-primary:#005495;
  --alv-dark:#003366;
  --alv-navy:#001d3d;
  --alv-accent:#0077c8;
  --alv-light:#e6f0f8;
  --alv-gold:#d4a843;
  --alv-success:#2d8a4e;
  --alv-warn:#e67e22;
  --alv-red:#c0392b;
  --alv-surface:#ffffff;
  --alv-text:#1a1a2e;
  --alv-muted:#5a6680;
  --alv-border:#dde3ec;
  --alv-radius:12px;
  --alv-shadow:0 2px 12px rgba(0,20,60,.06);
  --alv-shadow-lg:0 8px 32px rgba(0,20,60,.10);
}

/* ─── NAV ─── */
.top-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,51,102,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08);padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;transition:box-shadow .3s}
.top-nav.scrolled{box-shadow:0 4px 20px rgba(0,0,0,.2)}
.nav-logo{height:28px;filter:brightness(0) invert(1)}
.nav-links{display:flex;gap:28px}
.nav-links a{color:rgba(255,255,255,.75);text-decoration:none;font-size:13px;font-weight:500;letter-spacing:.3px;transition:color .2s}
.nav-links a:hover{color:#fff}
.nav-badge{background:var(--alv-gold);color:var(--alv-navy);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;letter-spacing:.5px}

/* ─── HERO ─── */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(135deg,var(--alv-navy) 0%,var(--alv-dark) 40%,var(--alv-primary) 100%);color:#fff;padding:120px 60px 80px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;right:-20%;width:80%;height:200%;background:radial-gradient(ellipse,rgba(0,119,200,.15) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(transparent,rgba(0,29,61,.4));pointer-events:none}
.hero-eyebrow{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--alv-gold);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.hero-eyebrow::before{content:'';width:40px;height:2px;background:var(--alv-gold)}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(2.5rem,5vw,4.2rem);font-weight:800;line-height:1.1;max-width:900px;margin-bottom:24px}
.hero h1 .accent{color:var(--alv-gold)}
.hero-sub{font-size:20px;color:rgba(255,255,255,.7);max-width:680px;line-height:1.7;font-weight:300}
.hero-stats{display:flex;gap:40px;margin-top:48px;flex-wrap:wrap}
.hero-stat{text-align:left}
.hero-stat-val{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:800;color:#fff}
.hero-stat-val .unit{font-size:20px;color:var(--alv-gold);margin-left:2px}
.hero-stat-label{font-size:12px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px}
.hero-logo{position:absolute;top:100px;right:60px;height:50px;filter:brightness(0) invert(1);opacity:.3}

/* ─── SECTIONS ─── */
.section{padding:100px 60px;max-width:1200px;margin:0 auto}
.section-full{padding:100px 60px}
.section-label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--alv-primary);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.section-label::before{content:'';width:24px;height:2px;background:var(--alv-primary)}
.section h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;color:var(--alv-navy);line-height:1.15;margin-bottom:20px}
.section h2 .highlight{color:var(--alv-primary)}
.section-intro{font-size:18px;color:var(--alv-muted);max-width:720px;line-height:1.8;margin-bottom:48px}

/* ─── MOMENTUM GRID ─── */
.momentum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;margin-top:40px}
.momentum-card{background:var(--alv-surface);border:1px solid var(--alv-border);border-radius:var(--alv-radius);padding:28px;transition:all .25s;position:relative;overflow:hidden}
.momentum-card:hover{transform:translateY(-3px);box-shadow:var(--alv-shadow-lg);border-color:var(--alv-primary)}
.momentum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--alv-primary);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.momentum-card:hover::before{transform:scaleX(1)}
.mc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:16px}
.mc-icon.blue{background:rgba(0,84,149,.08);color:var(--alv-primary)}
.mc-icon.gold{background:rgba(212,168,67,.1);color:var(--alv-gold)}
.mc-icon.green{background:rgba(45,138,78,.08);color:var(--alv-success)}
.mc-icon.orange{background:rgba(230,126,34,.08);color:var(--alv-warn)}
.mc-title{font-weight:700;font-size:15px;color:var(--alv-navy);margin-bottom:8px}
.mc-body{font-size:14px;color:var(--alv-muted);line-height:1.6}
.mc-stat{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:800;color:var(--alv-primary);margin-bottom:4px}

/* ─── PROBLEM SECTION ─── */
.problem-section{background:linear-gradient(135deg,#fdf6ec 0%,#fff9f0 100%);border-top:1px solid #f0e0c4;border-bottom:1px solid #f0e0c4}
.problem-columns{display:grid;grid-template-columns:1fr 1fr;gap:60px;margin-top:40px}
.problem-left{display:flex;flex-direction:column;gap:24px}
.problem-item{display:flex;gap:16px;align-items:flex-start}
.problem-bullet{width:32px;height:32px;border-radius:50%;background:rgba(192,57,43,.08);color:var(--alv-red);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:2px}
.problem-text h4{font-size:15px;font-weight:700;color:var(--alv-navy);margin-bottom:4px}
.problem-text p{font-size:14px;color:var(--alv-muted);line-height:1.6}
.problem-quote{background:var(--alv-surface);border-left:4px solid var(--alv-warn);border-radius:0 var(--alv-radius) var(--alv-radius) 0;padding:32px;font-size:17px;font-style:italic;color:var(--alv-navy);line-height:1.7;box-shadow:var(--alv-shadow);align-self:center}
.problem-quote cite{display:block;margin-top:16px;font-size:13px;font-style:normal;color:var(--alv-muted);font-weight:600}

/* ─── THREE LAYERS ─── */
.layers-section{background:var(--alv-navy);color:#fff;position:relative;overflow:hidden}
.layers-section::before{content:'';position:absolute;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse at top right,rgba(0,119,200,.1),transparent 70%);pointer-events:none}
.layers-section .section-label{color:var(--alv-gold)}
.layers-section .section-label::before{background:var(--alv-gold)}
.layers-section h2{color:#fff}
.layers-section .section-intro{color:rgba(255,255,255,.6)}
.layer-block{margin-bottom:64px;position:relative}
.layer-header{display:flex;align-items:center;gap:20px;margin-bottom:28px}
.layer-num{font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:900;color:var(--alv-gold);opacity:.4;line-height:1}
.layer-title-group h3{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#fff}
.layer-title-group p{font-size:14px;color:rgba(255,255,255,.5);margin-top:4px}
.layer-content{display:grid;grid-template-columns:1fr 1fr;gap:40px;padding-left:68px}
.layer-narrative{font-size:16px;color:rgba(255,255,255,.75);line-height:1.8}
.layer-narrative strong{color:#fff}
.layer-points{display:flex;flex-direction:column;gap:16px}
.layer-point{display:flex;gap:12px;align-items:flex-start}
.layer-point-icon{width:24px;height:24px;border-radius:6px;background:rgba(212,168,67,.15);color:var(--alv-gold);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px}
.layer-point p{font-size:14px;color:rgba(255,255,255,.7);line-height:1.6}
.layer-point p strong{color:#fff}
.peer-proof{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--alv-radius);padding:24px;margin-top:24px;margin-left:68px}
.peer-proof-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--alv-gold);margin-bottom:12px}
.peer-proof-items{display:flex;gap:24px;flex-wrap:wrap}
.peer-item{flex:1;min-width:240px;padding:16px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid rgba(255,255,255,.06)}
.peer-item h5{font-size:13px;font-weight:700;color:#fff;margin-bottom:6px}
.peer-item p{font-size:13px;color:rgba(255,255,255,.55);line-height:1.5}
.peer-item .peer-stat{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;color:var(--alv-gold);margin-bottom:4px}

/* ─── AGENT LANDSCAPE ─── */
.agent-landscape{background:linear-gradient(180deg,#f0f6fb 0%,#fff 100%)}
.agent-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;margin-top:40px}
.agent-category{background:var(--alv-surface);border:1px solid var(--alv-border);border-radius:var(--alv-radius);overflow:hidden;transition:all .25s}
.agent-category:hover{box-shadow:var(--alv-shadow-lg);transform:translateY(-2px)}
.agent-cat-header{padding:20px 24px;background:linear-gradient(135deg,var(--alv-navy),var(--alv-dark));color:#fff;display:flex;align-items:center;gap:12px}
.agent-cat-icon{font-size:22px}
.agent-cat-title{font-weight:700;font-size:15px}
.agent-cat-body{padding:24px}
.agent-vendor{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #f0f3f7}
.agent-vendor:last-child{border-bottom:none}
.agent-vendor-status{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.agent-vendor-status.active{background:var(--alv-success)}
.agent-vendor-status.planned{background:var(--alv-warn)}
.agent-vendor-status.future{background:var(--alv-border)}
.agent-vendor-info h5{font-size:14px;font-weight:600;color:var(--alv-navy)}
.agent-vendor-info p{font-size:13px;color:var(--alv-muted);line-height:1.5;margin-top:2px}
.agent-vendor-tag{font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 8px;border-radius:4px;text-transform:uppercase;margin-top:4px;display:inline-block}
.agent-vendor-tag.in-use{background:rgba(45,138,78,.08);color:var(--alv-success)}
.agent-vendor-tag.evaluating{background:rgba(230,126,34,.08);color:var(--alv-warn)}
.agent-vendor-tag.roadmap{background:rgba(0,84,149,.06);color:var(--alv-primary)}

.governance-callout{margin-top:48px;background:linear-gradient(135deg,var(--alv-navy),var(--alv-dark));border-radius:var(--alv-radius);padding:48px;color:#fff;position:relative;overflow:hidden}
.governance-callout::before{content:'';position:absolute;top:-50%;right:-10%;width:60%;height:200%;background:radial-gradient(ellipse,rgba(212,168,67,.08),transparent 70%);pointer-events:none}
.governance-callout h3{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:800;margin-bottom:16px}
.governance-callout p{font-size:16px;color:rgba(255,255,255,.7);line-height:1.7;max-width:700px}
.gov-comparison{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:32px}
.gov-col{padding:24px;border-radius:var(--alv-radius);border:1px solid rgba(255,255,255,.1)}
.gov-col.without{background:rgba(192,57,43,.08)}
.gov-col.with{background:rgba(45,138,78,.08)}
.gov-col h4{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
.gov-col.without h4{color:var(--alv-red)}
.gov-col.with h4{color:#4caf50}
.gov-col ul{list-style:none;display:flex;flex-direction:column;gap:10px}
.gov-col li{font-size:14px;color:rgba(255,255,255,.7);display:flex;align-items:flex-start;gap:8px}
.gov-col li::before{content:'';width:6px;height:6px;border-radius:50%;margin-top:7px;flex-shrink:0}
.gov-col.without li::before{background:rgba(192,57,43,.5)}
.gov-col.with li::before{background:rgba(76,175,80,.6)}

/* ─── PIPELINE ─── */
.pipeline-section{background:var(--alv-surface);border-top:1px solid var(--alv-border);border-bottom:1px solid var(--alv-border)}
.pipeline-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-top:40px}
.pipeline-card{background:var(--alv-light);border-radius:var(--alv-radius);padding:24px;border:1px solid rgba(0,84,149,.08);text-align:center;transition:all .25s}
.pipeline-card:hover{transform:scale(1.02);box-shadow:var(--alv-shadow)}
.pipeline-card.anchor{background:linear-gradient(135deg,var(--alv-primary),var(--alv-dark));color:#fff;border:none;grid-column:span 2}
.pipeline-card.anchor .pc-label{color:rgba(255,255,255,.6)}
.pipeline-card.anchor .pc-val{color:#fff}
.pc-val{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:800;color:var(--alv-primary);margin-bottom:4px}
.pc-label{font-size:12px;color:var(--alv-muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px}
.pc-detail{font-size:13px;color:var(--alv-muted);line-height:1.5}
.pipeline-card.anchor .pc-detail{color:rgba(255,255,255,.7)}
.consumption-row{display:flex;flex-wrap:wrap;gap:16px;margin-top:32px;justify-content:center}
.consumption-chip{background:var(--alv-surface);border:1px solid var(--alv-border);border-radius:20px;padding:8px 20px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--alv-muted)}
.consumption-chip .chip-val{font-weight:700;color:var(--alv-primary)}

/* ─── ACTION ─── */
.action-section{background:linear-gradient(135deg,var(--alv-primary),var(--alv-navy));color:#fff;text-align:center}
.action-section .section-label{color:var(--alv-gold);justify-content:center}
.action-section .section-label::before{background:var(--alv-gold)}
.action-section h2{color:#fff}
.action-steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:24px;margin-top:48px;max-width:900px;margin-left:auto;margin-right:auto}
.action-step{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--alv-radius);padding:28px;text-align:left}
.action-step-num{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:900;color:var(--alv-gold);opacity:.5;margin-bottom:12px}
.action-step h4{font-size:15px;font-weight:700;margin-bottom:8px}
.action-step p{font-size:13px;color:rgba(255,255,255,.6);line-height:1.6}

/* ─── DEAL RISK ALERT ─── */

/* ─── COST ARCHITECTURE ─── */
.cost-arch-section{background:linear-gradient(180deg,#f8fafb 0%,#edf2f7 100%);border-top:1px solid var(--alv-border)}
.cost-tier{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-top:40px}
.cost-tier-card{background:var(--alv-surface);border:1px solid var(--alv-border);border-radius:var(--alv-radius);overflow:hidden;transition:all .25s}
.cost-tier-card:hover{box-shadow:var(--alv-shadow-lg);transform:translateY(-2px)}
.cost-tier-header{padding:20px 24px;color:#fff;text-align:center}
.cost-tier-header.tier-foundation{background:linear-gradient(135deg,var(--alv-primary),var(--alv-dark))}
.cost-tier-header.tier-targeted{background:linear-gradient(135deg,var(--alv-gold),#b8912e)}
.cost-tier-header.tier-precision{background:linear-gradient(135deg,#2d8a4e,#1a6b38)}
.cost-tier-header h4{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:800;margin-bottom:4px}
.cost-tier-header .tier-who{font-size:12px;opacity:.8;font-weight:500}
.cost-tier-body{padding:24px}
.cost-tier-body .tier-cost{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--alv-primary);margin-bottom:16px;padding:8px 12px;background:var(--alv-light);border-radius:6px;text-align:center}
.cost-tier-body ul{list-style:none;display:flex;flex-direction:column;gap:10px}
.cost-tier-body li{font-size:13px;color:var(--alv-muted);display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.cost-tier-body li::before{content:'→';color:var(--alv-primary);font-weight:700;flex-shrink:0}
.arch-pattern{background:var(--alv-surface);border:1px solid var(--alv-border);border-radius:var(--alv-radius);padding:36px;margin-top:48px}
.arch-pattern h3{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;color:var(--alv-navy);margin-bottom:8px}
.arch-pattern .arch-sub{font-size:14px;color:var(--alv-muted);margin-bottom:24px}
.arch-flow{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:12px;align-items:center}
.arch-step{background:var(--alv-light);border:1px solid rgba(0,84,149,.1);border-radius:var(--alv-radius);padding:20px;text-align:center}
.arch-step h5{font-size:14px;font-weight:700;color:var(--alv-navy);margin-bottom:6px}
.arch-step p{font-size:12px;color:var(--alv-muted);line-height:1.5}
.arch-step .arch-cost{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--alv-success);margin-top:8px;padding:3px 8px;background:rgba(45,138,78,.06);border-radius:4px;display:inline-block}
.arch-arrow{font-size:20px;color:var(--alv-border);text-align:center}

/* ─── DEAL RISK ALERT ─── */
.risk-section{background:#fdf2f2;border-top:3px solid var(--alv-red);border-bottom:1px solid #f0d0d0}
.risk-banner{background:var(--alv-surface);border:2px solid var(--alv-red);border-radius:var(--alv-radius);padding:36px 40px;margin-top:40px;position:relative;overflow:hidden}
.risk-banner::before{content:'⚠';position:absolute;top:20px;right:24px;font-size:48px;opacity:.08}
.risk-badge{display:inline-block;background:var(--alv-red);color:#fff;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:4px;margin-bottom:16px}
.risk-banner h3{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:var(--alv-red);margin-bottom:12px}
.risk-banner p{font-size:15px;color:var(--alv-text);line-height:1.8;max-width:800px}
.risk-banner p strong{color:var(--alv-red)}
.risk-comparison{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:28px}
.risk-col{padding:20px;border-radius:8px;border:1px solid var(--alv-border)}
.risk-col.bad{background:#fff5f5;border-color:rgba(192,57,43,.15)}
.risk-col.good{background:#f0faf4;border-color:rgba(45,138,78,.15)}
.risk-col h4{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.risk-col.bad h4{color:var(--alv-red)}
.risk-col.good h4{color:var(--alv-success)}
.risk-col ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.risk-col li{font-size:13px;color:var(--alv-text);display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.risk-col li::before{content:'';width:6px;height:6px;border-radius:50%;margin-top:6px;flex-shrink:0}
.risk-col.bad li::before{background:var(--alv-red)}
.risk-col.good li::before{background:var(--alv-success)}

/* ─── FOOTER ─── */
.page-footer{background:var(--alv-navy);color:rgba(255,255,255,.4);padding:40px 60px;text-align:center;font-size:12px;border-top:1px solid rgba(255,255,255,.05)}
.page-footer .confidential{font-weight:700;color:var(--alv-gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}

/* ─── ANIMATIONS ─── */
.reveal{opacity:0;transform:translateY(30px);transition:all .6s cubic-bezier(.4,0,.2,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
@media(max-width:900px){
  .hero{padding:100px 24px 60px}
  .section,.section-full{padding:60px 24px}

/* ─── SCROLL REVEAL HOOK ─── */
function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { el.classList.add('visible'); obs.unobserve(el); }},
      { threshold: 0.12 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}
function Reveal({ children, className = '' }) {
  const r = useReveal();
  return <div ref={r} className={`reveal ${className}`}>{children}</div>;
}

/* ─── ANIMATED COUNTER ─── */
function Counter({ end, suffix = '', prefix = '', duration = 1800 }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const start = performance.now();
        const tick = (now) => {
          const p = Math.min((now - start) / duration, 1);
          const ease = 1 - Math.pow(1 - p, 3);
          setVal(Math.round(ease * end));
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }
    }, { threshold: 0.3 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [end, duration]);
  return <span ref={ref}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

              <span style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: 'var(--alv-muted)' }}>
                <span className="agent-vendor-status planned" style={{ position: 'static' }}></span> Evaluating / In Pipeline
              </span>
              <span style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: 'var(--alv-muted)' }}>
                <span className="agent-vendor-status future" style={{ position: 'static' }}></span> Industry Standard / Roadmap
              </span>
            </div>
          </Reveal>
          <div className="agent-grid">
            {agentCategories.map((cat, i) => (
              <Reveal key={i}>
                <div className="agent-category">
                  <div className="agent-cat-header">
                    <span className="agent-cat-icon">{cat.icon}</span>
                    <span className="agent-cat-title">{cat.title}</span>
                  </div>
                  <div className="agent-cat-body">
                    {cat.vendors.map((v, j) => (
                      <div className="agent-vendor" key={j}>
                        <span className={`agent-vendor-status ${v.status}`}></span>
                        <div className="agent-vendor-info">
                          <h5>{v.name}</h5>
                          <p>{v.desc}</p>
                          <span className={`agent-vendor-tag ${v.status === 'active' ? 'in-use' : v.status === 'planned' ? 'evaluating' : 'roadmap'}`}>{v.tag}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </Reveal>
            ))}
          </div>

          {/* GOVERNANCE CALLOUT */}
          <Reveal>
            <div className="governance-callout">
              <h3>Why Agent 365 Changes Everything for Manufacturing</h3>
              <p>
                A car company making airbags, seatbelts, and steering wheels can't afford autonomous agent sprawl.
                When UiPath bots trigger SAP workflows that feed ServiceNow tickets that route to custom Azure AI models — who governs that chain?
              </p>
              <div className="gov-comparison">
                <div className="gov-col without">
                  <h4>Without Agent 365</h4>
                  <ul>
                    <li>Each vendor's AI operates in isolation</li>
                    <li>No unified audit trail across agent systems</li>
                    <li>Shadow agents built by departments with no IT visibility</li>
                    <li>Compliance gaps across IATF 16949, ISO 26262, SOX</li>
                    <li>Incident response requires checking 5+ vendor consoles</li>
                    <li>No way to measure cross-platform agent ROI</li>
                  </ul>
                </div>
                <div className="gov-col with">
                  <h4>With Agent 365</h4>
                  <ul>
                    <li>Unified agent catalog across first-party, third-party, and custom</li>
                    <li>Single audit trail for compliance and safety reporting</li>
                    <li>Approved agent marketplace with IT governance gates</li>
                    <li>Automated compliance checks against automotive standards</li>
                    <li>One dashboard for all agent activity, usage, and incidents</li>
                    <li>Cross-platform ROI measurement and optimization</li>
                  </ul>
                </div>
              </div>
            </div>
          </Reveal>
        </div>
      </section>

      {/* COST ARCHITECTURE */}
      <section className="section-full cost-arch-section" id="cost">
        <div style={{ maxWidth: 1200, margin: '0 auto' }}>
          <Reveal>
            <div className="section-label">AI Cost Architecture</div>
            <h2>Not Everyone Needs <span className="highlight">Everything</span> — And That's the Point</h2>
            <p className="section-intro">
              E7 is the foundation. But Cowork, Scout, and advanced AI capabilities have their own cost profiles.
              The strategy isn't "give everyone everything" — it's tiered deployment with policies and cost controls
              that match the right tool to the right user at the right price.
            </p>
          </Reveal>
          <Reveal>
            <div className="cost-tier">
              <div className="cost-tier-card">
                <div className="cost-tier-header tier-foundation">
                  <h4>Foundation: E7 + Copilot</h4>
                  <div className="tier-who">All 20,400 Information Workers</div>
                </div>
                <div className="cost-tier-body">
                  <div className="tier-cost">Bundled into E7 — Fixed Cost</div>
                  <ul>
                    <li>Copilot in every M365 app — email, Teams, Word, Excel, PowerPoint</li>
                    <li>Agent Builder — build department-specific agents, no dev resources</li>
                    <li>First-party agents — IT Help Desk, HR Self-Service, knowledge search</li>
                    <li>Agent 365 governance — unified catalog, approval workflows, audit trail</li>
                    <li>Business-to-employee agents run at fixed cost, not per-message</li>
                  </ul>
                </div>
              </div>
              <div className="cost-tier-card">
                <div className="cost-tier-header tier-targeted">
                  <h4>Targeted: Cowork</h4>
                  <div className="tier-who">Managers, Analysts, Power Users</div>
                </div>
                <div className="cost-tier-body">
                  <div className="tier-cost">Policy-Controlled — Assigned by Role</div>
                  <ul>
                    <li>Deep multi-turn reasoning across larger problem sets</li>
                    <li>Multi-model access — route different tasks to the right model</li>
                    <li>Complex analysis: financial modeling, supply chain optimization, R&D exploration</li>
                    <li>Not everyone needs this — deploy via policy to roles that justify the cost</li>
                    <li>Built-in cost controls and usage caps prevent runaway spend</li>
                  </ul>
                </div>
              </div>
              <div className="cost-tier-card">
                <div className="cost-tier-header tier-precision">
                  <h4>Precision: Scout</h4>
                  <div className="tier-who">Citizen Developers, AI Champions</div>
                </div>
                <div className="cost-tier-body">
                  <div className="tier-cost">Targeted Deployment — Builder Tier</div>
                  <ul>
                    <li>Full desktop AI environment for building and composing workflows</li>
                    <li>Business builders who create the next wave of useful agents</li>
                    <li>Inspect, automate, and orchestrate across M365 + custom data</li>
                    <li>Small user base, high impact — your AI power users and champions</li>
                    <li>Feeds innovation back into the Agent Builder ecosystem for everyone</li>
                  </ul>
                </div>
              </div>
            </div>
          </Reveal>

          {/* AGENT ARCHITECTURE PATTERN */}
          <Reveal>
            <div className="arch-pattern">
              <h3>The Cost-Efficient Agent Architecture Pattern</h3>
              <p className="arch-sub">
                Not every agent needs to be running expensive models 24/7. The pattern that keeps costs down:
                thin collectors that listen cheap, intelligent agents that only engage when there's something material.
              </p>
              <div className="arch-flow">
                <div className="arch-step">
                  <h5>Thin Collectors</h5>
                  <p>Lightweight listeners that watch email, Teams, calendar, CRM, and operational data. Minimal token usage — they just observe and flag.</p>
                  <div className="arch-cost">Low cost — pennies/day</div>
                </div>
                <div className="arch-arrow">→</div>
                <div className="arch-step">
                  <h5>Intelligent Routing</h5>
                  <p>Signals get classified and prioritized. Only material events — anomalies, decisions needed, deadlines approaching — get promoted to action.</p>
                  <div className="arch-cost">Near-zero — rules-based</div>
                </div>
                <div className="arch-arrow">→</div>
                <div className="arch-step">
                  <h5>Agentic Action</h5>
                  <p>Full AI reasoning only fires when there's something worth acting on. Draft, propose, escalate — then go quiet until the next material event.</p>
                  <div className="arch-cost">Pay only for value</div>
                </div>
              </div>
              <p style={{ fontSize: 14, color: 'var(--alv-muted)', marginTop: 24, lineHeight: 1.7 }}>
                This is how you scale agentic AI without runaway costs. Most of the day, agents are listening — not thinking.
                When they do think, it's because something actually matters. The architecture keeps token costs proportional
                to value delivered, not proportional to time running. Combined with E7's fixed-cost foundation for employee-facing
                scenarios, the total cost model is predictable, governable, and defensible to a CFO.
              </p>
            </div>
          </Reveal>
        </div>
      </section>

      {/* PIPELINE */}
      <section className="section-full pipeline-section" id="pipeline">
        <div style={{ maxWidth: 1200, margin: '0 auto' }}>
          <Reveal>
            <div className="section-label">Pipeline View</div>
            <h2>The E7 W2W Deal: <span className="highlight">≤$4.9M Annual</span></h2>
            <p className="section-intro">
              20,400 information workers × ≤$20/user/month = up to ~$4.9M annual. That's ceiling pricing based on TQL and Polaris comps — 
              we may be able to go more aggressive. At that price, Autoliv gets Copilot + Agent Builder + Agent 365 for less than they'd 
              pay stacking $23/user Copilot add-ons across even half their IWs.
            </p>
          </Reveal>
          <Reveal>
            <div className="pipeline-grid">
              {pipeline.map((p, i) => (
                <div className={`pipeline-card ${p.anchor ? 'anchor' : ''}`} key={i}>
                  <div className="pc-val">{p.val}</div>
                  <div className="pc-label">{p.label}</div>
                  <div className="pc-detail">{p.detail}</div>
                </div>
              ))}
            </div>
          </Reveal>
          <Reveal>
            <div className="consumption-row">
              <div className="consumption-chip">Azure Arc & Defender <span className="chip-val">$130K/mo</span></div>
              <div className="consumption-chip">Defender for Cloud <span className="chip-val">$28.8K/mo</span></div>
              <div className="consumption-chip">Azure OpenAI <span className="chip-val">$18K/mo</span></div>
              <div className="consumption-chip">DB Modernization <span className="chip-val">$20K/mo</span></div>
              <div className="consumption-chip">GitHub Copilot <span className="chip-val">$3.9K/mo</span></div>
              <div className="consumption-chip">Fabric + Snowflake <span className="chip-val">$6.2K/mo</span></div>
            </div>
          </Reveal>
        </div>
      </section>

      {/* DEAL RISK: RESERVATIONS */}
      <section className="section-full risk-section" id="risk">
        <div style={{ maxWidth: 1200, margin: '0 auto' }}>
          <Reveal>
            <div className="section-label" style={{ color: 'var(--alv-red)' }}>Deal Execution Risk</div>
            <h2 style={{ color: 'var(--alv-red)' }}>Reservations Are <span style={{ color: 'var(--alv-navy)' }}>Not Commits</span></h2>
          </Reveal>
          <Reveal>
            <div className="risk-banner">
              <div className="risk-badge">Critical Risk</div>
              <h3>The 3,000 New Licenses Must Be Bulk Purchases — Not Reservations</h3>
              <p>
                Autoliv has approved funding for 3,000 additional Copilot licenses. The default motion will be reservations —
                which means they can <strong>true those down before anniversary and we don't get paid</strong>. This is not acceptable. 
                We need to drive a <strong>bulk purchase commitment now</strong> that hits mid-term and locks in payment at anniversary.
                The E7 conversation is the vehicle: why reserve 3,000 seats at add-on pricing when E7 covers all 20,400 IWs 
                at better unit economics with no true-down risk?
              </p>
              <div className="risk-comparison">
                <div className="risk-col bad">
                  <h4>Reservations (Current Path)</h4>
                  <ul>
                    <li>Customer can true down at any time</li>
                    <li>We don't get paid until consumption is proven</li>
                    <li>Doesn't hit mid-term — defers revenue recognition</li>
                    <li>Reinforces seat-by-seat mentality vs. platform</li>
                    <li>Each BU reserves independently — no leverage</li>
                  </ul>
                </div>
                <div className="risk-col good">
                  <h4>Bulk Purchase via E7 (Target Path)</h4>
                  <ul>
                    <li>Committed spend — no true-down risk</li>
                    <li>Hits mid-term and we get paid at anniversary</li>
                    <li>Better per-user economics for the customer</li>
                    <li>Agents, governance, and training included</li>
                    <li>One platform decision replaces four separate asks</li>
                  </ul>
                </div>
              </div>
            </div>
          </Reveal>
        </div>
      </section>

      {/* ACTION */}
      <section className="section-full action-section" id="action">
        <div style={{ maxWidth: 1200, margin: '0 auto' }}>
          <Reveal>
            <div className="section-label">What We Do Next</div>
            <h2>Four Moves to Close</h2>
          </Reveal>
          <Reveal>
            <div className="action-steps">
              {actions.map((a, i) => (
                <div className="action-step" key={i}>
                  <div className="action-step-num">{a.num}</div>
                  <h4>{a.title}</h4>
                  <p>{a.text}</p>
                </div>
              ))}
            </div>
          </Reveal>
        </div>
      </section>

      {/* FOOTER */}
      <footer className="page-footer">
        <div className="confidential">Microsoft Internal — Not for Customer Distribution</div>
        <p>Autoliv E7 Strategy Narrative — Account Team Reference — July 2026</p>
        <p style={{ marginTop: 8 }}>Built with live MSX pipeline data. Numbers reflect current CRM state as of {new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}.</p>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
